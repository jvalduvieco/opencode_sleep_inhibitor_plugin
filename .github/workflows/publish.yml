name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Build package
        run: bun run build

      - name: Read release metadata
        id: release
        run: |
          VERSION=$(bun --eval 'const pkg = await Bun.file("package.json").json(); console.log(pkg.version)')
          TAG="${GITHUB_REF_NAME}"
          if [ "v$VERSION" != "$TAG" ]; then
            printf 'Tag %s does not match package.json version v%s.\n' "$TAG" "$VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: gh release create "${{ steps.release.outputs.tag }}" --verify-tag --generate-notes --title "${{ steps.release.outputs.tag }}"
        env:
          GH_TOKEN: ${{ github.token }}
